<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/admin}">
<head>
    <title>Chat — Admin</title>
</head>
<body>
<div layout:fragment="content">
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/admin/chat}">Chat khách hàng</a></li>
            <li class="breadcrumb-item active" th:text="${conversation.userName}">User</li>
        </ol>
    </nav>

    <h2 class="mb-2">
        <i class="fas fa-user"></i>
        <span th:text="${conversation.userName}">User</span>
        <small class="text-muted fw-normal" th:text="'(' + ${conversation.userEmail} + ')'">(email)</small>
    </h2>

    <div id="chat-messages" class="chat-messages mb-3" style="max-width: 800px;" aria-live="polite"></div>

    <form th:action="@{/admin/chat/{id}/send(id=${conversation.id})}" method="post" class="card shadow-sm" style="max-width: 800px;">
        <div class="card-body">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <label for="content" class="form-label">Trả lời khách</label>
            <textarea class="form-control mb-2" id="content" name="content" rows="3"
                      maxlength="2000" required placeholder="Nhập tin nhắn..."></textarea>
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-paper-plane"></i> Gửi
            </button>
        </div>
    </form>

    <script th:inline="javascript">
        (function () {
            const pollUrl = /*[[@{/admin/chat/{cid}/api/messages(cid=${conversation.id})}]]*/ '';
            const box = document.getElementById('chat-messages');

            function escapeHtml(s) {
                if (s == null) return '';
                const d = document.createElement('div');
                d.textContent = s;
                return d.innerHTML;
            }

            function render(msgs) {
                if (!box) return;
                let html = '';
                for (let i = 0; i < msgs.length; i++) {
                    const m = msgs[i];
                    const fromAdmin = m.fromAdmin;
                    const cls = fromAdmin ? 'chat-bubble--user' : 'chat-bubble--admin';
                    const who = fromAdmin ? ('Bạn (admin): ' + escapeHtml(m.authorName || '')) : ('Khách: ' + escapeHtml(m.authorName || ''));
                    html += '<div class="d-flex mb-2 ' + (fromAdmin ? 'justify-content-end' : 'justify-content-start') + '">';
                    html += '<div>';
                    html += '<div class="chat-bubble ' + cls + '">' + escapeHtml(m.content || '') + '</div>';
                    html += '<div class="chat-meta ' + (fromAdmin ? 'text-end' : '') + '">' + escapeHtml(who);
                    if (m.createdAt) {
                        html += ' · ' + escapeHtml(m.createdAt.replace('T', ' ').substring(0, 16));
                    }
                    html += '</div></div></div>';
                }
                if (msgs.length === 0) {
                    html = '<p class="text-muted text-center mb-0 small">Chưa có tin nhắn.</p>';
                }
                box.innerHTML = html;
                box.scrollTop = box.scrollHeight;
            }

            async function poll() {
                try {
                    const r = await fetch(pollUrl, {credentials: 'same-origin'});
                    if (!r.ok) return;
                    const data = await r.json();
                    render(data);
                } catch (e) { /* ignore */ }
            }

            poll();
            setInterval(poll, 4000);
        })();
    </script>
</div>
</body>
</html>
