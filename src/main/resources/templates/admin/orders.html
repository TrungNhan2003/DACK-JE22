<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/admin}">
<head>
    <title>Quản lý đơn hàng - Admin</title>
</head>
<body>
    <div layout:fragment="content">
        <h2 class="mb-4"><i class="fas fa-shopping-cart"></i> Quản lý đơn hàng</h2>

        <div class="card shadow-sm">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead class="table-light">
                            <tr>
                                <th>Mã đơn</th>
                                <th>Khách hàng</th>
                                <th>SĐT</th>
                                <th>Tổng tiền</th>
                                <th>Ngày đặt</th>
                                <th>Trạng thái</th>
                                <th>Thao tác</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="order : ${orders}">
                                <td>
                                    <a th:href="@{/admin/orders/{id}(id=${order.id})}" 
                                       class="text-decoration-none fw-bold"
                                       th:text="'#' + ${order.id}">#1</a>
                                </td>
                                <td th:text="${order.fullName}">Name</td>
                                <td th:text="${order.phone}">Phone</td>
                                <td class="text-danger fw-bold"
                                    th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' ₫'">0 ₫</td>
                                <td th:text="${#temporals.format(order.createdAt, 'HH:mm dd/MM/yyyy')}">01/01/2026</td>
                                <td>
                                    <span class="badge"
                                          th:classappend="${order.status.name == 'PAID'} ? 'bg-success' :
                                                           (${order.status.name == 'PENDING_PAYMENT'} ? 'bg-warning' :
                                                           (${order.status.name == 'DONE'} ? 'bg-success' :
                                                           (${order.status.name == 'CANCELLED'} ? 'bg-danger' :
                                                           (${order.status.name == 'PENDING'} ? 'bg-warning' :
                                                           (${order.status.name == 'CONFIRMED'} ? 'bg-info' : 'bg-primary')))))"
                                          th:text="${order.status.name == 'PAID' ? 'Đã thanh toán' :
                                                   (order.status.name == 'PENDING_PAYMENT' ? 'Chờ thanh toán' :
                                                   (order.status.name == 'PENDING' ? 'Chờ xử lý' :
                                                   (order.status.name == 'CONFIRMED' ? 'Đã xác nhận' :
                                                   (order.status.name == 'SHIPPING' ? 'Đang giao' :
                                                   (order.status.name == 'DONE' ? 'Hoàn thành' : 'Đã hủy')))))}">
                                        Status
                                    </span>
                                </td>
                                <td>
                                    <a th:href="@{/admin/orders/{id}(id=${order.id})}" 
                                       class="btn btn-sm btn-outline-primary">
                                        <i class="fas fa-eye"></i> Xem
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
