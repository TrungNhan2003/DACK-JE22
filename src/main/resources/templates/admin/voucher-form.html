<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/admin}">
<head>
    <title th:text="${voucherForm.id != null} ? 'Sửa voucher' : 'Tạo voucher'">Voucher</title>
</head>
<body>
<div layout:fragment="content">
    <h2 class="mb-4">
        <i class="fas fa-ticket-alt"></i>
        <span th:text="${voucherForm.id != null} ? 'Sửa mã giảm giá' : 'Tạo mã giảm giá'">Tạo</span>
    </h2>

    <div class="card shadow-sm" style="max-width: 560px;">
        <div class="card-body">
            <form th:action="@{/admin/vouchers/save}" method="post" th:object="${voucherForm}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" th:field="*{id}" th:if="*{id != null}"/>

                <div class="mb-3">
                    <label class="form-label">Mã voucher <span class="text-danger">*</span></label>
                    <input type="text" class="form-control text-uppercase" th:field="*{code}"
                           placeholder="VD: SALE44" required maxlength="64" autocomplete="off">
                    <div class="form-text">Lưu dạng in hoa. Khách nhập không phân biệt hoa thường.</div>
                    <div class="text-danger small" th:if="${#fields.hasErrors('code')}" th:errors="*{code}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Loại giảm <span class="text-danger">*</span></label>
                    <select class="form-select" th:field="*{discountType}" required>
                        <option value="PERCENT">Giảm theo % trên tạm tính</option>
                        <option value="FIXED_AMOUNT">Giảm số tiền cố định (₫)</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Giá trị <span class="text-danger">*</span></label>
                    <input type="number" class="form-control" th:field="*{discountValue}" required
                           step="0.01" min="0" placeholder="VD: 4.4 (%) hoặc 50000 (₫)">
                    <div class="form-text">Nếu chọn %: nhập ví dụ 4.4 = 4,4%. Nếu chọn số tiền: nhập VND.</div>
                    <div class="text-danger small" th:if="${#fields.hasErrors('discountValue')}" th:errors="*{discountValue}"></div>
                </div>

                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="active" th:field="*{active}">
                    <label class="form-check-label" for="active">Đang sử dụng</label>
                </div>

                <div class="mb-3">
                    <label class="form-label">Ghi chú (nội bộ)</label>
                    <input type="text" class="form-control" th:field="*{description}" maxlength="255"
                           placeholder="VD: Chiến dịch 4.4">
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Lưu
                    </button>
                    <a th:href="@{/admin/vouchers}" class="btn btn-outline-secondary">Hủy</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
