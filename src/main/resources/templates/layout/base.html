<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fashion Shop</title>

    <!-- CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/theme.css}">

    <!-- CSRF — cần cho cả user lẫn admin (widget dùng fetch POST) -->
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_parameter" th:content="${_csrf.parameterName}"/>
</head>

<body class="d-flex flex-column min-vh-100">

<!-- HEADER -->
<th:block th:replace="~{fragments/header :: header}"></th:block>

<!-- CONTENT (flex-grow-1 pushes footer down) -->
<main class="flex-grow-1 container my-4" layout:fragment="content">
    Nội dung mặc định
</main>

<!-- FOOTER -->
<th:block th:replace="~{fragments/footer :: footer}"></th:block>

<!-- JS Bootstrap (phải trước chat-widget.js) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>

<!-- CHAT WIDGET — chỉ hiện cho user đã đăng nhập, không phải admin -->
<th:block sec:authorize="isAuthenticated() and !hasRole('ADMIN')">
    <th:block th:replace="~{fragments/chat-widget :: widget}"></th:block>
    <script th:src="@{/js/chat-widget.js}"></script>
</th:block>

<!-- 🔥 QUAN TRỌNG NHẤT (CHO CART CHẠY JS) -->
<th:block layout:fragment="scripts"></th:block>

</body>
</html>
