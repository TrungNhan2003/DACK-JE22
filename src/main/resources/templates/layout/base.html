<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fashion Shop</title>

    <!-- CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/theme.css}">

    <!-- CSRF — cần cho cả user lẫn admin (widget dùng fetch POST) -->
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_parameter" th:content="${_csrf.parameterName}"/>
</head>

<body class="fashion-page">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark fashion-navbar sticky-top">
    <div class="container">

        <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/}">
            <span class="brand-pill">
                <i class="fas fa-tshirt"></i>
            </span>
            <span>Fashion Shop</span>
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">

            <!-- MENU -->
            <ul class="navbar-nav me-auto mb-3 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}">Trang chủ</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/products}">Sản phẩm</a>
                </li>

                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin/dashboard}">
                        <i class="fas fa-user-shield"></i> Admin
                    </a>
                </li>
            </ul>

            <!-- SEARCH -->
            <form class="d-flex me-3" th:action="@{/search}" method="get">
                <input class="form-control me-2" type="search"
                       name="keyword" placeholder="Tìm kiếm áo, quần...">
                <button class="btn btn-light">
                    <i class="fas fa-search"></i>
                </button>
            </form>

            <!-- ICON -->
            <ul class="navbar-nav align-items-center">

                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" th:href="@{/cart}">
                        <i class="fas fa-shopping-cart"></i>
                    </a>
                </li>

                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" th:href="@{/account}">
                        <i class="fas fa-user"></i>
                    </a>
                </li>

                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="nav-link" th:href="@{/login}">
                        <i class="fas fa-sign-in-alt"></i>
                    </a>
                </li>

                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <form th:action="@{/logout}" method="post">
                        <input type="hidden"
                               th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}"/>
                        <button class="btn btn-link nav-link text-white">
                            <i class="fas fa-sign-out-alt"></i>
                        </button>
                    </form>
                </li>

            </ul>

        </div>
    </div>
</nav>

<!-- CONTENT -->
<main class="container my-4" layout:fragment="content">
    Nội dung mặc định
</main>

<!-- FOOTER -->
<footer class="bg-dark text-white text-center py-4">
    <div class="container">
        <p class="mb-0">© 2026 Fashion Shop. All rights reserved.</p>
    </div>
</footer>

<!-- JS Bootstrap (phải trước chat-widget.js) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>

<!-- CHAT WIDGET — chỉ hiện cho user đã đăng nhập, không phải admin -->
<th:block sec:authorize="isAuthenticated() and !hasRole('ADMIN')">
    <th:block th:replace="~{fragments/chat-widget :: widget}"></th:block>
    <script th:src="@{/js/chat-widget.js}"></script>
</th:block>

<!-- 🔥 QUAN TRỌNG NHẤT (CHO CART CHẠY JS) -->
<th:block layout:fragment="scripts"></th:block>

</body>
</html>
