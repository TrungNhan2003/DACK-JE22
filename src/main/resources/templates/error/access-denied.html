<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>Truy cập bị từ chối - Fashion Shop</title>
</head>
<body>
    <div layout:fragment="content" class="text-center py-5">
        <div class="card shadow-sm d-inline-block">
            <div class="card-body p-5">
                <i class="fas fa-lock text-danger" style="font-size: 5rem;"></i>
                <h1 class="mt-3 text-danger">403 - Truy cập bị từ chối</h1>
                <p class="lead text-muted">
                    Bạn không có quyền truy cập vào trang này.
                </p>
                <div class="mt-4">
                    <a th:href="@{/}" class="btn btn-primary me-2">
                        <i class="fas fa-home"></i> Về trang chủ
                    </a>
                    <a th:href="@{/account}" class="btn btn-outline-secondary">
                        <i class="fas fa-user"></i> Tài khoản của tôi
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
