<!DOCTYPE html>

      layout:decorate="~{layout/base}">
<head>
    <title>Lỗi máy chủ - Fashion Shop</title>
</head>
<body>

                <h1 class="mt-3 text-danger">500 - Lỗi máy chủ</h1>

                    Có lỗi xảy ra, vui lòng thử lại sau.
                </p>
                <div class="mt-4">
                    <a th:href="@{/}" class="btn btn-primary">

                    </a>
                </div>
            </div>
        </div>
    </div>

</html>
