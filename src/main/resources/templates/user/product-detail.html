<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title th:text="${product.name} + ' - Fashion Shop'">Product Detail</title>
</head>
<body>
    <div layout:fragment="content">
        <nav aria-label="breadcrumb" class="mb-4">
            <ol class="breadcrumb">
                <li class="breadcrumb-item">
                    <a th:href="@{/}" class="text-decoration-none">Trang chủ</a>
                </li>
                <li class="breadcrumb-item">
                    <a th:href="@{/products}" class="text-decoration-none">Sản phẩm</a>
                </li>
                <li class="breadcrumb-item active" th:text="${product.name}">Product</li>
            </ol>
        </nav>

        <div class="row">
            <!-- Product Image -->
            <div class="col-lg-6 mb-4 mb-lg-0">
                <div class="card shadow-sm">
                    <div class="card-body p-0">
                        <img th:src="${product.imageUrl}" 
                             th:alt="${product.name}"
                             class="img-fluid w-100"
                             style="max-height: 500px; object-fit: cover;">
                    </div>
                </div>
            </div>

            <!-- Product Info -->
            <div class="col-lg-6">
                <h1 class="mb-3" th:text="${product.name}">Product Name</h1>
                
                <div class="mb-3">
                    <span class="badge bg-primary" th:text="${product.category?.name}">Category</span>
                    <span class="badge" 
                          th:classappend="${product.stock > 0} ? 'bg-success' : 'bg-danger'"
                          th:text="${product.stock > 0} ? 'Còn hàng' : 'Hết hàng'">
                        Status
                    </span>
                </div>

                <div class="mb-4">
                    <div class="d-flex align-items-center">
                        <span th:if="${product.salePrice != null}" 
                              class="text-danger fs-2 fw-bold"
                              th:text="${#numbers.formatDecimal(product.salePrice, 0, 'COMMA', 0, 'POINT')} + ' ₫'">
                            0 ₫
                        </span>
                        <span th:unless="${product.salePrice != null}" 
                              class="text-primary fs-2 fw-bold"
                              th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'">
                            0 ₫
                        </span>
                        
                        <span th:if="${product.salePrice != null}" 
                              class="text-muted text-decoration-line-through ms-3 fs-5"
                              th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'">
                            0 ₫
                        </span>
                        
                        <span th:if="${product.salePrice != null}" 
                              class="badge bg-danger ms-3 fs-6">
                            -<span th:text="${#numbers.formatDecimal((product.price - product.salePrice) / product.price * 100, 0, 'DEFAULT', 0, 'DEFAULT')}">%</span>
                        </span>
                    </div>
                </div>

                <div class="mb-4">
                    <h5>Mô tả sản phẩm</h5>
                    <p class="text-muted" th:text="${product.description ?: 'Chưa có mô tả'}">
                        Description
                    </p>
                </div>

                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <form th:action="@{/cart/add/{id}(id=${product.id})}" method="post">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Số lượng:</label>
                                <div class="input-group" style="width: 150px;">
                                    <button type="button" class="btn btn-outline-secondary btn-minus">
                                        <i class="fas fa-minus"></i>
                                    </button>
                                    <input type="number" name="quantity" value="1" min="1" 
                                           th:max="${product.stock}"
                                           class="form-control text-center quantity-input">
                                    <button type="button" class="btn btn-outline-secondary btn-plus">
                                        <i class="fas fa-plus"></i>
                                    </button>
                                </div>
                                <small class="text-muted" th:if="${product.stock > 0}">
                                    Còn lại: <span th:text="${product.stock}">0</span> sản phẩm
                                </small>
                            </div>
                            
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary btn-lg" 
                                        th:disabled="${product.stock <= 0}">
                                    <i class="fas fa-cart-plus"></i> Thêm vào giỏ hàng
                                </button>
                                <a th:href="@{/products}" class="btn btn-outline-secondary">
                                    <i class="fas fa-arrow-left"></i> Quay lại
                                </a>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Product Features -->
                <div class="row g-3">
                    <div class="col-6">
                        <div class="d-flex align-items-center">
                            <i class="fas fa-truck fa-2x text-primary me-3"></i>
                            <div>
                                <h6 class="mb-0">Giao hàng nhanh</h6>
                                <small class="text-muted">2-3 ngày làm việc</small>
                            </div>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="d-flex align-items-center">
                            <i class="fas fa-undo fa-2x text-primary me-3"></i>
                            <div>
                                <h6 class="mb-0">Đổi trả dễ dàng</h6>
                                <small class="text-muted">Trong 7 ngày</small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Related Products -->
        <section class="mt-5" th:if="${relatedProducts != null && !relatedProducts.empty}">
            <h3 class="mb-4">Sản phẩm liên quan</h3>
            <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4">
                <div class="col" th:each="prod : ${relatedProducts}">
                    <div class="card product-card h-100 shadow-sm">
                        <div class="position-relative">
                            <img th:src="${prod.imageUrl}" 
                                 th:alt="${prod.name}"
                                 class="card-img-top product-image product-image--compact">
                            <span th:if="${prod.salePrice != null}" 
                                  class="badge bg-danger position-absolute top-0 end-0 m-2">
                                Giảm giá
                            </span>
                        </div>
                        <div class="card-body">
                            <h6 class="card-title">
                                <a th:href="@{/products/{slug}(slug=${prod.slug})}" 
                                   class="text-decoration-none text-dark"
                                   th:text="${prod.name}">Product</a>
                            </h6>
                            <div class="mb-2">
                                <span th:if="${prod.salePrice != null}" 
                                      class="text-danger fw-bold"
                                      th:text="${#numbers.formatDecimal(prod.salePrice, 0, 'COMMA', 0, 'POINT')} + ' ₫'">
                                    0 ₫
                                </span>
                                <span th:unless="${prod.salePrice != null}" 
                                      class="text-primary fw-bold"
                                      th:text="${#numbers.formatDecimal(prod.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'">
                                    0 ₫
                                </span>
                            </div>
                            <form th:action="@{/cart/add/{id}(id=${prod.id})}" method="post" class="d-grid">
                                <button type="submit" class="btn btn-primary btn-sm">
                                    <i class="fas fa-cart-plus"></i> Thêm vào giỏ
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
