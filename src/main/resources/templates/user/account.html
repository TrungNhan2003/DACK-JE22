<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>Tài khoản của tôi - Fashion Shop</title>
</head>
<body>
    <div layout:fragment="content">
        <h2 class="mb-4">
            <i class="fas fa-user-circle"></i> Tài khoản của tôi
        </h2>
        
        <div class="row">
            <div class="col-md-4">
                <div class="list-group">
                    <a href="#" class="list-group-item list-group-item-action active">
                        <i class="fas fa-user"></i> Thông tin tài khoản
                    </a>
                    <a th:href="@{/order-history}" class="list-group-item list-group-item-action">
                        <i class="fas fa-box"></i> Lịch sử đơn hàng
                    </a>
                    <a href="#" class="list-group-item list-group-item-action">
                        <i class="fas fa-cog"></i> Cài đặt
                    </a>
                </div>
            </div>
            
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">Thông tin cá nhân</h5>
                    </div>
                    <div class="card-body">
                        <table class="table table-bordered">
                            <tr>
                                <th width="30%"><i class="fas fa-user"></i> Họ và tên:</th>
                                <td th:text="${user?.fullName}">-</td>
                            </tr>
                            <tr>
                                <th><i class="fas fa-envelope"></i> Email:</th>
                                <td th:text="${user?.email}">-</td>
                            </tr>
                            <tr>
                                <th><i class="fas fa-phone"></i> Số điện thoại:</th>
                                <td th:text="${user?.phone ?: 'Chưa cập nhật'}">-</td>
                            </tr>
                            <tr>
                                <th><i class="fas fa-map-marker-alt"></i> Địa chỉ:</th>
                                <td th:text="${user?.address ?: 'Chưa cập nhật'}">-</td>
                            </tr>
                            <tr>
                                <th><i class="fas fa-shield-alt"></i> Vai trò:</th>
                                <td>
                                    <span class="badge" 
                                          th:classappend="${user?.role?.name == 'ROLE_ADMIN'} ? 'bg-danger' : 'bg-info'"
                                          th:text="${user?.role?.name == 'ROLE_ADMIN'} ? 'Quản trị viên' : 'Người dùng'">
                                    </span>
                                </td>
                            </tr>
                            <tr>
                                <th><i class="fas fa-check-circle"></i> Trạng thái:</th>
                                <td>
                                    <span class="badge" 
                                          th:classappend="${user?.enabled} ? 'bg-success' : 'bg-secondary'"
                                          th:text="${user?.enabled} ? 'Hoạt động' : 'Bị khóa'">
                                    </span>
                                </td>
                            </tr>
                        </table>
                        
                        <div class="mt-3">
                            <a th:href="@{/account/edit}" class="btn btn-primary">
                                <i class="fas fa-edit"></i> Chỉnh sửa thông tin
                            </a>
                            <form th:action="@{/logout}" method="post" class="d-inline m-0 p-0">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-outline-danger">
                                    <i class="fas fa-sign-out-alt"></i> Đăng xuất
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
