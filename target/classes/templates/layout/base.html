<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fashion Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/theme.css}">
</head>
<body class="fashion-page">
<nav class="navbar navbar-expand-lg navbar-dark fashion-navbar sticky-top">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/}">
            <span class="brand-pill" aria-hidden="true">
                <i class="fas fa-tshirt"></i>
            </span>
            <span>Fashion Shop</span>
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto mb-3 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}">Trang chủ</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/products}">Sản phẩm</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin/dashboard}">
                        <i class="fas fa-user-shield me-1"></i> Admin
                    </a>
                </li>
            </ul>

            <form class="d-flex fashion-search mb-3 mb-lg-0" th:action="@{/search}" method="get" role="search">
                <input class="form-control me-2" type="search" name="keyword" placeholder="Tìm kiếm áo, quần..."
                       aria-label="Tìm kiếm">
                <button class="btn btn-light" type="submit" aria-label="Tìm kiếm">
                    <i class="fas fa-search"></i>
                </button>
            </form>

            <ul class="navbar-nav align-items-lg-center gap-lg-1">
                <li class="nav-item me-lg-1" sec:authorize="isAuthenticated()">
                    <a class="nav-link" th:href="@{/cart}" title="Giỏ hàng">
                        <i class="fas fa-shopping-cart"></i>
                    </a>
                </li>

                <li class="nav-item me-lg-1" sec:authorize="isAuthenticated()">
                    <a class="nav-link" th:href="@{/account}" title="Tài khoản">
                        <i class="fas fa-user"></i>
                    </a>
                </li>

                <li class="nav-item me-lg-1" sec:authorize="!isAuthenticated()">
                    <a class="nav-link" th:href="@{/login}" title="Đăng nhập">
                        <i class="fas fa-right-to-bracket"></i>
                    </a>
                </li>

                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <form th:action="@{/logout}" method="post" class="m-0 p-0">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-link nav-link text-white text-decoration-none p-0"
                                title="Đăng xuất">
                            <i class="fas fa-sign-out-alt"></i>
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main class="container my-4" layout:fragment="content">
    <p>Nội dung mặc định</p>
</main>

<footer class="fashion-footer bg-dark text-white text-center py-4">
    <div class="container">
        <div class="row g-2 align-items-center">
            <div class="col-12 col-md-6 text-center text-md-start">
                <p class="mb-0">&copy; 2026 Fashion Shop. All rights reserved.</p>
            </div>
            <div class="col-12 col-md-6 small text-center text-md-end text-white-50">
                <span><i class="fas fa-truck me-1"></i> Miễn phí vận chuyển từ 500.000₫</span>
                <span class="mx-2 d-none d-md-inline">|</span>
                <span><i class="fas fa-undo me-1"></i> Đổi trả trong 7 ngày</span>
            </div>
        </div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
