<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/admin}">
<head>
    <title>Mã giảm giá - Admin</title>
</head>
<body>
<div layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0"><i class="fas fa-ticket-alt"></i> Mã giảm giá (voucher)</h2>
        <a th:href="@{/admin/vouchers/new}" class="btn btn-primary">
            <i class="fas fa-plus"></i> Tạo mã mới
        </a>
    </div>

    <div th:if="${vouchers == null || vouchers.isEmpty()}" class="alert alert-info">
        Chưa có voucher nào. Khách chỉ dùng được mã do bạn tạo ở đây.
    </div>

    <div th:if="${vouchers != null && !vouchers.isEmpty()}" class="table-responsive card shadow-sm">
        <table class="table table-hover mb-0 align-middle">
            <thead class="table-light">
            <tr>
                <th>Mã</th>
                <th>Loại</th>
                <th>Giá trị</th>
                <th>Trạng thái</th>
                <th>Mô tả</th>
                <th class="text-end">Thao tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="v : ${vouchers}">
                <td class="fw-bold" th:text="${v.code}">CODE</td>
                <td>
                    <span th:if="${v.discountType.name() == 'PERCENT'}">Phần trăm (%)</span>
                    <span th:if="${v.discountType.name() == 'FIXED_AMOUNT'}">Số tiền (₫)</span>
                </td>
                <td th:text="${v.discountType.name() == 'PERCENT'} ? ${v.discountValue} + ' %' : ${#numbers.formatDecimal(v.discountValue, 0, 'COMMA', 0, 'POINT')} + ' ₫'">
                    0
                </td>
                <td>
                    <span class="badge bg-success" th:if="${v.active}">Đang bật</span>
                    <span class="badge bg-secondary" th:unless="${v.active}">Tắt</span>
                </td>
                <td><small class="text-muted" th:text="${v.description}">-</small></td>
                <td class="text-end text-nowrap">
                    <a th:href="@{/admin/vouchers/{id}/edit(id=${v.id})}" class="btn btn-sm btn-outline-primary">
                        <i class="fas fa-edit"></i>
                    </a>
                    <form th:action="@{/admin/vouchers/{id}/delete(id=${v.id})}" method="post" class="d-inline"
                          onsubmit="return confirm('Xóa voucher này?');">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-sm btn-outline-danger">
                            <i class="fas fa-trash"></i>
                        </button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
