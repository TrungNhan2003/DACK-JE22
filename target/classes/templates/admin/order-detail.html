<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/admin}">
<head>
    <title>Chi tiết đơn hàng - Admin</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="mb-4">
            <a th:href="@{/admin/orders}" class="btn btn-outline-secondary">
                <i class="fas fa-arrow-left"></i> Quay lại
            </a>
            <h2 class="d-inline ms-3">
                <i class="fas fa-receipt"></i> Đơn hàng #<span th:text="${order.id}">1</span>
            </h2>
        </div>

        <div class="row">
            <div class="col-lg-8">
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-white">
                        <h5 class="mb-0">Sản phẩm trong đơn</h5>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table">
                                <thead class="table-light">
                                    <tr>
                                        <th>Sản phẩm</th>
                                        <th class="text-center">Đơn giá</th>
                                        <th class="text-center">SL</th>
                                        <th class="text-end">Tổng</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="item : ${order.orderItems}">
                                        <td>
                                            <div class="d-flex align-items-center">
                                                <img th:src="${item.product.imageUrl}" 
                                                     th:alt="${item.product.name}"
                                                     style="width: 60px; height: 60px; object-fit: cover;"
                                                     class="rounded me-3">
                                                <div>
                                                    <h6 class="mb-0" th:text="${item.product.name}">Product</h6>
                                                    <small class="text-muted" th:text="${item.product.category?.name}">Category</small>
                                                </div>
                                            </div>
                                        </td>
                                        <td class="text-center"
                                            th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'">
                                            0 ₫
                                        </td>
                                        <td class="text-center" th:text="${item.quantity}">1</td>
                                        <td class="text-end fw-bold"
                                            th:text="${#numbers.formatDecimal(item.price * item.quantity, 0, 'COMMA', 0, 'POINT')} + ' ₫'">
                                            0 ₫
                                        </td>
                                    </tr>
                                </tbody>
                                <tfoot>
                                    <tr>
                                        <td colspan="3" class="text-end fw-bold">Tổng cộng:</td>
                                        <td class="text-end text-danger fw-bold fs-5"
                                            th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' ₫'">
                                            0 ₫
                                        </td>
                                    </tr>
                                </tfoot>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-white">
                        <h5 class="mb-0">Cập nhật trạng thái</h5>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/admin/orders/update-status/{id}(id=${order.id})}" method="post">
                            <div class="mb-3">
                                <label class="form-label">Trạng thái hiện tại</label>
                                <select name="status" class="form-select">
                                    <option value="PENDING" th:selected="${order.status.name == 'PENDING'}">Chờ xử lý</option>
                                    <option value="PENDING_PAYMENT" th:selected="${order.status.name == 'PENDING_PAYMENT'}">Chờ thanh toán</option>
                                    <option value="PAID" th:selected="${order.status.name == 'PAID'}">Đã thanh toán</option>
                                    <option value="CONFIRMED" th:selected="${order.status.name == 'CONFIRMED'}">Đã xác nhận</option>
                                    <option value="SHIPPING" th:selected="${order.status.name == 'SHIPPING'}">Đang giao</option>
                                    <option value="DONE" th:selected="${order.status.name == 'DONE'}">Hoàn thành</option>
                                    <option value="CANCELLED" th:selected="${order.status.name == 'CANCELLED'}">Đã hủy</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="fas fa-sync-alt"></i> Cập nhật
                            </button>
                        </form>
                    </div>
                </div>

                <div class="card shadow-sm">
                    <div class="card-header bg-info text-white">
                        <h5 class="mb-0">Thông tin giao hàng</h5>
                    </div>
                    <div class="card-body">
                        <p class="mb-2">
                            <i class="fas fa-user"></i> 
                            <strong>Người nhận:</strong> 
                            <span th:text="${order.fullName}">Name</span>
                        </p>
                        <p class="mb-2">
                            <i class="fas fa-phone"></i> 
                            <strong>SĐT:</strong> 
                            <span th:text="${order.phone}">Phone</span>
                        </p>
                        <p class="mb-2">
                            <i class="fas fa-map-marker-alt"></i> 
                            <strong>Địa chỉ:</strong> 
                            <span th:text="${order.address}">Address</span>
                        </p>
                        <p class="mb-2">
                            <i class="fas fa-wallet"></i> 
                            <strong>Thanh toán:</strong> 
                            <span th:text="${order.paymentMethod.name == 'COD' ? 'Thanh toán khi nhận hàng' : 
                                           (order.paymentMethod.name == 'BANK_TRANSFER' ? 'Chuyển khoản' : 'ZaloPay')}">
                                Payment
                            </span>
                        </p>
                        <p class="mb-0">
                            <i class="fas fa-clock"></i> 
                            <strong>Ngày đặt:</strong> 
                            <span th:text="${#temporals.format(order.createdAt, 'HH:mm dd/MM/yyyy')}">01/01/2026</span>
                        </p>
                    </div>
                </div>

                <div class="mt-3">
                    <form th:action="@{/admin/orders/delete/{id}(id=${order.id})}" method="post"
                          onsubmit="return confirm('Bạn có chắc chắn muốn hủy đơn hàng này?')">
                        <button type="submit" class="btn btn-danger w-100"
                                th:if="${order.status.name != 'CANCELLED' && order.status.name != 'DONE'}">
                            <i class="fas fa-times"></i> Hủy đơn hàng
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
