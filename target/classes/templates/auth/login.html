<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>Đăng nhập - Fashion Shop</title>
</head>
<body>
<div layout:fragment="content" class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0 text-center">
                    <i class="fas fa-sign-in-alt"></i> Đăng nhập
                </h4>
            </div>

            <div class="card-body">

                <!-- Thông báo -->
                <div th:if="${param.registerSuccess}" class="alert alert-success">
                    Đăng ký thành công! Vui lòng đăng nhập.
                </div>

                <div th:if="${param.logout}" class="alert alert-info">
                    Bạn đã đăng xuất thành công.
                </div>

                <div th:if="${param.error}" class="alert alert-danger">
                    Email hoặc mật khẩu không đúng!
                </div>

                <!-- FORM LOGIN -->
                <form th:action="@{/login}" method="post">

                    <!-- EMAIL -->
                    <div class="mb-3">
                        <label for="email" class="form-label">
                            <i class="fas fa-envelope"></i> Email
                        </label>
                        <input type="email"
                               class="form-control"
                               id="email"
                               name="email"
                               placeholder="Nhập email"
                               required>
                    </div>

                    <!-- PASSWORD -->
                    <div class="mb-3">
                        <label for="password" class="form-label">
                            <i class="fas fa-lock"></i> Mật khẩu
                        </label>
                        <input type="password"
                               class="form-control"
                               id="password"
                               name="password"
                               placeholder="Nhập mật khẩu"
                               required>
                    </div>

                    <!-- CSRF -->
                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}"/>

                    <!-- BUTTON -->
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-sign-in-alt"></i> Đăng nhập
                        </button>
                    </div>

                </form>

                <hr>

                <!-- REGISTER -->
                <p class="text-center mb-0">
                    Chưa có tài khoản?
                    <a th:href="@{/register}">Đăng ký ngay</a>
                </p>

            </div>
        </div>
    </div>
</div>
</body>
</html>
