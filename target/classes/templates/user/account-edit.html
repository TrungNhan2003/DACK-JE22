<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>Chỉnh sửa tài khoản - Fashion Shop</title>
</head>
<body>
<div layout:fragment="content">
    <h2 class="mb-4">
        <i class="fas fa-user-edit"></i> Chỉnh sửa thông tin tài khoản
    </h2>

    <div class="row">
        <div class="col-md-8 offset-md-2">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">Thông tin cá nhân</h5>
                </div>
                <div class="card-body">
                    <form th:action="@{/account/update}" method="post"
                          th:object="${accountUpdateDTO}">
                        <div class="mb-3">
                            <label class="form-label">
                                <i class="fas fa-user"></i> Họ và tên <span class="text-danger">*</span>
                            </label>
                            <input type="text" class="form-control" th:field="*{fullName}">
                            <div class="text-danger" th:if="${#fields.hasErrors('fullName')}"
                                 th:errors="*{fullName}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                <i class="fas fa-phone"></i> Số điện thoại <span class="text-danger">*</span>
                            </label>
                            <input type="text" class="form-control" th:field="*{phone}">
                            <div class="text-danger" th:if="${#fields.hasErrors('phone')}"
                                 th:errors="*{phone}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                <i class="fas fa-map-marker-alt"></i> Địa chỉ nhận hàng <span class="text-danger">*</span>
                            </label>
                            <textarea class="form-control" rows="3" th:field="*{address}"></textarea>
                            <div class="text-danger" th:if="${#fields.hasErrors('address')}"
                                 th:errors="*{address}"></div>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a th:href="@{/account}" class="btn btn-outline-secondary">
                                <i class="fas fa-arrow-left"></i> Quay lại
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save"></i> Lưu thay đổi
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
