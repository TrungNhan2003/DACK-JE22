<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>Lịch sử đơn hàng - Fashion Shop</title>
</head>
<body>
    <div layout:fragment="content">
        <h2 class="mb-4"><i class="fas fa-box"></i> Lịch sử đơn hàng</h2>

        <div th:if="${orders == null || orders.empty}">
            <div class="alert alert-info">
                <i class="fas fa-info-circle"></i> Bạn chưa có đơn hàng nào.
            </div>
            <a th:href="@{/products}" class="btn btn-primary">
                <i class="fas fa-shopping-bag"></i> Mua sắm ngay
            </a>
        </div>

        <div th:if="${orders != null && !orders.empty}" class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th>Ngày đặt</th>
                        <th>Tổng tiền</th>
                        <th>Trạng thái</th>
                        <th>Phương thức</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="order : ${orders}">
                        <td th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}">
                            01/01/2026 10:00
                        </td>

                        <td class="fw-bold text-danger"
                            th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' ₫'">
                            0 ₫
                        </td>

                        <td>
                            <span class="badge bg-warning text-dark"
                                  th:if="${order.status != null and order.status.name() == 'PENDING'}">
                                Chờ xử lý
                            </span>
                            <span class="badge bg-info text-dark"
                                  th:if="${order.status != null and order.status.name() == 'CONFIRMED'}">
                                Đã xác nhận
                            </span>
                            <span class="badge bg-primary"
                                  th:if="${order.status != null and order.status.name() == 'SHIPPING'}">
                                Đang giao
                            </span>
                            <span class="badge bg-success"
                                  th:if="${order.status != null and order.status.name() == 'DONE'}">
                                Hoàn thành
                            </span>
                            <span class="badge bg-danger"
                                  th:if="${order.status != null and order.status.name() == 'CANCELLED'}">
                                Đã hủy
                            </span>
                        </td>

                        <td>
                            <span th:if="${order.paymentMethod != null and order.paymentMethod.name() == 'COD'}">
                                Thanh toán khi nhận hàng
                            </span>
                            <span th:if="${order.paymentMethod != null and order.paymentMethod.name() == 'BANK_TRANSFER'}">
                                Chuyển khoản
                            </span>
                            <span th:if="${order.paymentMethod != null and order.paymentMethod.name() == 'MOMO'}">
                                MoMo
                            </span>
                        </td>

                        <td>
                            <a th:href="@{/order-history/{id}(id=${order.id})}"
                               class="btn btn-sm btn-outline-primary">
                                <i class="fas fa-eye"></i> Chi tiết
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
