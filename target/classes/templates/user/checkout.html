<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>Thanh toán - Fashion Shop</title>
</head>
<body>
    <div layout:fragment="content">
        <h2 class="mb-4"><i class="fas fa-credit-card"></i> Thanh toán</h2>

        <form th:action="@{/checkout}" method="post" th:object="${checkoutDTO}">
            <div class="row">
                <div class="col-lg-7">
                    <div class="card shadow-sm mb-4">
                        <div class="card-header bg-primary text-white">
                            <h5 class="mb-0">Thông tin giao hàng</h5>
                        </div>
                        <div class="card-body">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="fullName" class="form-label">
                                        <i class="fas fa-user"></i> Họ và tên <span class="text-danger">*</span>
                                    </label>
                                    <input type="text" class="form-control" id="fullName" 
                                           th:field="*{fullName}" required>
                                    <div class="text-danger" th:if="${#fields.hasErrors('fullName')}" 
                                         th:errors="*{fullName}"></div>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="phone" class="form-label">
                                        <i class="fas fa-phone"></i> Số điện thoại <span class="text-danger">*</span>
                                    </label>
                                    <input type="tel" class="form-control" id="phone" 
                                           th:field="*{phone}" required>
                                    <div class="text-danger" th:if="${#fields.hasErrors('phone')}" 
                                         th:errors="*{phone}"></div>
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="address" class="form-label">
                                    <i class="fas fa-map-marker-alt"></i> Địa chỉ nhận hàng <span class="text-danger">*</span>
                                </label>
                                <textarea class="form-control" id="address" rows="3" 
                                          th:field="*{address}" required></textarea>
                                <div class="text-danger" th:if="${#fields.hasErrors('address')}" 
                                     th:errors="*{address}"></div>
                            </div>

                            <div class="mb-3">
                                <label for="note" class="form-label">
                                    <i class="fas fa-comment"></i> Ghi chú (tùy chọn)
                                </label>
                                <textarea class="form-control" id="note" rows="2" 
                                          th:field="*{note}" 
                                          placeholder="Ví dụ: Giao giờ hành chính, không gửi đánh chuông..."></textarea>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-lg-5">
                    <div class="card shadow-sm">
                        <div class="card-header bg-success text-white">
                            <h5 class="mb-0">Đơn hàng của bạn</h5>
                        </div>
                        <div class="card-body">
                            <div class="table-responsive">
                                <table class="table table-sm">
                                    <thead>
                                        <tr>
                                            <th>Sản phẩm</th>
                                            <th class="text-center">SL</th>
                                            <th class="text-end">Tổng</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="item : ${cartItems}">
                                            <td>
                                                <small th:text="${item.product.name}">Product</small>
                                            </td>
                                            <td class="text-center" th:text="${item.quantity}">1</td>
                                            <td class="text-end">
                                                <small th:text="${#numbers.formatDecimal(item.price * item.quantity, 0, 'COMMA', 0, 'POINT')} + ' ₫'">
                                                    0 ₫
                                                </small>
                                            </td>
                                        </tr>
                                    </tbody>
                                    <tfoot>
                                        <tr>
                                            <td colspan="2" class="fw-bold">Tạm tính:</td>
                                            <td id="checkout-subtotal-display" class="text-end fw-bold"
                                                th:text="${#numbers.formatDecimal(cartTotal, 0, 'COMMA', 0, 'POINT')} + ' ₫'">
                                                0 ₫
                                            </td>
                                        </tr>
                                        <tr id="checkout-discount-row"
                                            th:classappend="${voucherDiscount == null} ? 'd-none' : ''">
                                            <td colspan="2" class="text-success">
                                                <i class="fas fa-tag"></i> Giảm giá voucher
                                                <span class="small text-muted d-block" th:if="*{voucherCode != null and !#strings.isEmpty(voucherCode)}"
                                                      th:text="'(mã: ' + *{voucherCode} + ')'">(mã)</span>
                                            </td>
                                            <td id="checkout-discount-amount" class="text-end text-success fw-bold"
                                                th:text="${voucherDiscount != null} ? ('-' + ${#numbers.formatDecimal(voucherDiscount, 0, 'COMMA', 0, 'POINT')} + ' ₫') : ''">
                                                0 ₫
                                            </td>
                                        </tr>
                                        <tr>
                                            <td colspan="2" class="fw-bold">Thanh toán:</td>
                                            <td id="checkout-final-display" class="text-end text-danger fw-bold"
                                                th:text="${#numbers.formatDecimal(finalTotal, 0, 'COMMA', 0, 'POINT')} + ' ₫'">
                                                0 ₫
                                            </td>
                                        </tr>
                                    </tfoot>
                                </table>
                            </div>

                            <div class="mb-3">
                                <label for="voucherCode" class="form-label fw-bold">
                                    <i class="fas fa-ticket-alt"></i> Mã giảm giá
                                </label>
                                <input type="text" class="form-control" id="voucherCode" th:field="*{voucherCode}"
                                       placeholder="Nhập mã (nếu có)" autocomplete="off">
                                <div id="checkout-voucher-msg" class="small text-danger mt-1"></div>
                                <div class="form-text">Mã do cửa hàng cấp. Nhập xong vài giây sẽ tự cập nhật số tiền thanh toán.</div>
                                <div class="text-danger small" th:if="${#fields.hasErrors('voucherCode')}"
                                     th:errors="*{voucherCode}"></div>
                            </div>

                            <hr>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Phương thức thanh toán:</label>
                                <div class="form-check mb-2">
                                    <input class="form-check-input" type="radio" th:field="*{paymentMethod}"
                                           id="cod" value="COD">
                                    <label class="form-check-label" for="cod">
                                        <i class="fas fa-money-bill-wave"></i> Thanh toán khi nhận hàng (COD)
                                    </label>
                                </div>
                                <div class="form-check mb-2">
                                    <input class="form-check-input" type="radio" th:field="*{paymentMethod}"
                                           id="bank" value="BANK_TRANSFER">
                                    <label class="form-check-label" for="bank">
                                        <i class="fas fa-university"></i> Chuyển khoản ngân hàng
                                    </label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" th:field="*{paymentMethod}"
                                           id="momo" value="MOMO">
                                    <label class="form-check-label" for="momo">
                                        <i class="fas fa-wallet"></i> Ví điện tử MoMo
                                    </label>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-success btn-lg w-100">
                                <i class="fas fa-check-circle"></i> Đặt hàng ngay
                            </button>

                            <p class="text-muted small mt-3 mb-0 text-center">
                                <i class="fas fa-shield-alt"></i> Đơn hàng của bạn được bảo mật
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </form>

        <script th:inline="javascript">
            (function () {
                const subtotal = /*[[${cartTotal}]]*/ 0;
                const previewUrl = /*[[@{/checkout/api/voucher-preview}]]*/ '/checkout/api/voucher-preview';
                const input = document.getElementById('voucherCode');
                const row = document.getElementById('checkout-discount-row');
                const discCell = document.getElementById('checkout-discount-amount');
                const finalCell = document.getElementById('checkout-final-display');
                const msg = document.getElementById('checkout-voucher-msg');

                function fmtVnd(n) {
                    if (n == null || isNaN(Number(n))) return '';
                    return new Intl.NumberFormat('vi-VN').format(Math.round(Number(n))) + ' ₫';
                }

                let timer;
                function schedulePreview() {
                    clearTimeout(timer);
                    timer = setTimeout(runPreview, 420);
                }

                async function runPreview() {
                    if (!input || !finalCell) return;
                    if (msg) msg.textContent = '';
                    const code = input.value.trim();
                    if (!code) {
                        if (row) row.classList.add('d-none');
                        finalCell.textContent = fmtVnd(subtotal);
                        return;
                    }
                    try {
                        const r = await fetch(previewUrl + '?code=' + encodeURIComponent(code), {credentials: 'same-origin'});
                        if (!r.ok) return;
                        const data = await r.json();
                        if (!data.valid) {
                            if (row) row.classList.add('d-none');
                            finalCell.textContent = fmtVnd(subtotal);
                            if (msg) msg.textContent = data.message || 'Mã không hợp lệ';
                            return;
                        }
                        const disc = data.discountAmount != null ? Number(data.discountAmount) : 0;
                        if (disc > 0 && row && discCell) {
                            row.classList.remove('d-none');
                            discCell.textContent = '-' + fmtVnd(disc);
                        } else if (row) {
                            row.classList.add('d-none');
                        }
                        const fin = data.finalTotal != null ? Number(data.finalTotal) : subtotal;
                        finalCell.textContent = fmtVnd(fin);
                    } catch (e) { /* ignore */ }
                }

                if (input) {
                    input.addEventListener('input', schedulePreview);
                    input.addEventListener('change', schedulePreview);
                }
            })();
        </script>
    </div>
</body>
</html>
