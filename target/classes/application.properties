# ===================================
# DATABASE
# ===================================
spring.datasource.url=jdbc:mysql://localhost:3306/fashionshop?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================
# JPA / HIBERNATE
# ===================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ===================================
# THYMELEAF
# ===================================
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# ===================================
# SERVER
# ===================================
server.port=8080
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true

# ===================================
# UPLOAD FILE (ảnh sản phẩm)
# ===================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=src/main/resources/static/uploads

# ===================================
# APP INFO
# ===================================
spring.application.name=fashionshop